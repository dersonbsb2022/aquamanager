name: Docker Publish

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  # Um pacote no GHCR (Packages → aquamanager), duas tags: api-latest e web-latest
  IMAGE_NAME: ghcr.io/dersonbsb2022/aquamanager

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: api
            context: packages/api
            dockerfile: packages/api/Dockerfile
            tag: api-latest
            vite_api_url: ''
          - name: web
            context: packages/web
            dockerfile: packages/web/Dockerfile
            tag: web-latest
            vite_api_url: ''

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ matrix.tag }}
            type=sha,prefix=${{ matrix.name }}-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_API_URL=${{ matrix.vite_api_url }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Imagem publicada
        run: echo "${{ env.IMAGE_NAME }}:${{ matrix.tag }}"
