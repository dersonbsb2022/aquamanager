# Cole no Portainer — mesmo formato do aquarium-light-controller + Postgres
# Imagem: ghcr.io/dersonbsb2022/aquamanager:latest (nome = repositório GitHub)
#
# 1) Substitua ALTERE_* (senha igual no postgres e na DATABASE_URL)
# 2) Ajuste o Host do Traefik se precisar
# 3) Registry ghcr.io já configurado no Portainer (igual ao light)

version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: aquamanager
      POSTGRES_PASSWORD: ALTERE_SENHA_DO_BANCO
      POSTGRES_DB: aquamanager
      TZ: America/Sao_Paulo
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - netsrv
    deploy:
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
        delay: 5s

  aquamanager:
    image: ghcr.io/dersonbsb2022/aquamanager:latest
    volumes:
      - app_uploads:/app/api/uploads
    environment:
      - DATABASE_URL=postgresql://aquamanager:ALTERE_SENHA_DO_BANCO@postgres:5432/aquamanager
      - JWT_SECRET=ALTERE_JWT_SECRET_MINIMO_32_CARACTERES
      - JWT_REFRESH_SECRET=ALTERE_JWT_REFRESH_MINIMO_32_CARACTERES
      - PORT=3333
      - NODE_ENV=production
      - UPLOAD_DIR=/app/api/uploads
      - MAX_UPLOAD_MB=5
      - TZ=America/Sao_Paulo
    networks:
      - netsrv
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
    labels:
      - traefik.enable=true
      - traefik.http.routers.aquamanager.rule=Host(`aqua.tmcsuporte.com.br`)
      - traefik.http.routers.aquamanager.entrypoints=websecure
      - traefik.http.routers.aquamanager.tls=true
      - traefik.http.routers.aquamanager.tls.certresolver=letsencryptresolver
      - traefik.http.routers.aquamanager.service=aquamanager
      - traefik.http.services.aquamanager.loadbalancer.server.port=8080

networks:
  netsrv:
    external: true
    name: netsrv

volumes:
  pgdata:
  app_uploads:
