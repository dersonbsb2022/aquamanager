version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-aquamanager}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: ${DB_NAME:-aquamanager}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - backend
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  api:
    image: ${API_IMAGE:-ghcr.io/dersonbsb2022/aquamanager-api:latest}
    build:
      context: ./packages/api
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://${DB_USER:-aquamanager}:${DB_PASSWORD:-changeme}@postgres:5432/${DB_NAME:-aquamanager}
      JWT_SECRET: ${JWT_SECRET:-super-secret-change-me}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-super-refresh-change-me}
      PORT: 3333
      NODE_ENV: production
      UPLOAD_DIR: /app/uploads
      MAX_UPLOAD_MB: ${MAX_UPLOAD_MB:-5}
    volumes:
      - api_uploads:/app/uploads
    networks:
      - backend
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
      update_config:
        parallelism: 1
        delay: 10s
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "require(''http'').get(''http://127.0.0.1:3333/health'',r=>process.exit(r.statusCode===200?0:1)).on(''error'',()=>process.exit(1))"',
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

  web:
    image: ${WEB_IMAGE:-ghcr.io/dersonbsb2022/aquamanager-web:latest}
    build:
      context: ./packages/web
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-}
    ports:
      - "${WEB_PORT:-80}:80"
    networks:
      - backend
      - frontend
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1/ >/dev/null 2>&1 || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  backend:
    driver: overlay
  frontend:
    driver: overlay

volumes:
  pgdata:
  api_uploads:
