# Stack Docker Swarm / Portainer
#
# Edite os valores marcados com ALTERE_* diretamente neste arquivo antes de implantar.
# O Portainer não lê arquivo .env — tudo precisa estar aqui no YAML.
#
# Imagens (GitHub Actions → GHCR, pacote único "aquamanager"):
#   ghcr.io/dersonbsb2022/aquamanager:api-latest
#   ghcr.io/dersonbsb2022/aquamanager:web-latest
#
# Portainer — obrigatório se o pacote for PRIVADO:
#   1) Registries → Add registry → Custom → ghcr.io
#   2) Username: seu usuário GitHub | Password: PAT com read:packages
#   3) Na stack, marque usar registry / deploy com autenticação
# Ou torne o pacote público: github.com → Packages → aquamanager → Package settings → Public
#
# Teste no servidor: docker pull ghcr.io/dersonbsb2022/aquamanager:api-latest

version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: aquamanager
      POSTGRES_PASSWORD: ALTERE_SENHA_DO_BANCO
      POSTGRES_DB: aquamanager
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - backend
    deploy:
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure

  api:
    image: ghcr.io/dersonbsb2022/aquamanager:api-latest
    environment:
      # Use a mesma senha definida em POSTGRES_PASSWORD acima
      DATABASE_URL: postgresql://aquamanager:ALTERE_SENHA_DO_BANCO@postgres:5432/aquamanager
      JWT_SECRET: ALTERE_JWT_SECRET_MINIMO_32_CARACTERES
      JWT_REFRESH_SECRET: ALTERE_JWT_REFRESH_MINIMO_32_CARACTERES
      PORT: "3333"
      NODE_ENV: production
      UPLOAD_DIR: /app/uploads
      MAX_UPLOAD_MB: "5"
    volumes:
      - api_uploads:/app/uploads
    networks:
      - backend
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
      update_config:
        parallelism: 1
        delay: 10s

  web:
    image: ghcr.io/dersonbsb2022/aquamanager:web-latest
    ports:
      - target: 80
        published: 80
        protocol: tcp
        mode: host
    networks:
      - backend
      - frontend
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure

networks:
  backend:
    driver: overlay
  frontend:
    driver: overlay

volumes:
  pgdata:
  api_uploads:
