# Stack para Docker Swarm (imagens publicadas no GHCR pelo workflow docker-publish.yml)
#
# 1) Copie .env.prod.example → .env e preencha segredos
# 2) docker login ghcr.io
# 3) docker stack deploy -c docker-compose.stack.yml aquamanager
#
# O frontend usa nginx como reverse proxy (/api e /uploads → serviço api).
# Não é necessário VITE_API_URL no build quando usar as imagens oficiais do repositório.

version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - backend
    deploy:
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure

  api:
    image: ${API_IMAGE:-ghcr.io/dersonbsb2022/aquamanager-api:latest}
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      PORT: 3333
      NODE_ENV: production
      UPLOAD_DIR: /app/uploads
      MAX_UPLOAD_MB: ${MAX_UPLOAD_MB:-5}
    volumes:
      - api_uploads:/app/uploads
    networks:
      - backend
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
      update_config:
        parallelism: 1
        delay: 10s

  web:
    image: ${WEB_IMAGE:-ghcr.io/dersonbsb2022/aquamanager-web:latest}
    ports:
      - target: 80
        published: ${WEB_PORT:-80}
        protocol: tcp
        mode: host
    networks:
      - backend
      - frontend
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure

networks:
  backend:
    driver: overlay
  frontend:
    driver: overlay

volumes:
  pgdata:
  api_uploads:
