# Stack Docker Swarm / Portainer + Traefik (rede netsrv)
#
# Edite ALTERE_* e o Host do Traefik antes de implantar.
# Imagens: ghcr.io/dersonbsb2022/aquamanager-api:latest | aquamanager-web:latest
#
# O nginx do serviço web faz proxy de /api e /uploads para a API (mesmo host).

version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: aquamanager
      POSTGRES_PASSWORD: ALTERE_SENHA_DO_BANCO
      POSTGRES_DB: aquamanager
      TZ: America/Sao_Paulo
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - netsrv
    deploy:
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
        delay: 5s

  api:
    image: ghcr.io/dersonbsb2022/aquamanager-api:latest
    environment:
      DATABASE_URL: postgresql://aquamanager:ALTERE_SENHA_DO_BANCO@postgres:5432/aquamanager
      JWT_SECRET: ALTERE_JWT_SECRET_MINIMO_32_CARACTERES
      JWT_REFRESH_SECRET: ALTERE_JWT_REFRESH_MINIMO_32_CARACTERES
      PORT: "3333"
      NODE_ENV: production
      UPLOAD_DIR: /app/uploads
      MAX_UPLOAD_MB: "5"
      TZ: America/Sao_Paulo
    volumes:
      - api_uploads:/app/uploads
    networks:
      - netsrv
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s

  web:
    image: ghcr.io/dersonbsb2022/aquamanager-web:latest
    environment:
      TZ: America/Sao_Paulo
    networks:
      - netsrv
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
    labels:
      - traefik.enable=true
      - traefik.http.routers.aquamanager.rule=Host(`aqua.tmcsuporte.com.br`)
      - traefik.http.routers.aquamanager.entrypoints=websecure
      - traefik.http.routers.aquamanager.tls=true
      - traefik.http.routers.aquamanager.tls.certresolver=letsencryptresolver
      - traefik.http.routers.aquamanager.service=aquamanager
      - traefik.http.services.aquamanager.loadbalancer.server.port=80
      # Opcional — basic auth (mesmo padrão do aquarium-light):
      # - traefik.http.routers.aquamanager.middlewares=aquamanager-auth@docker
      # - traefik.http.middlewares.aquamanager-auth.basicauth.users=usuario:$$2y$$...

networks:
  netsrv:
    external: true
    name: netsrv

volumes:
  pgdata:
  api_uploads:
